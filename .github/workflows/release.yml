name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        service:
          - name: authentication-service
            path: ./api/services/authentication-service
            node-version: "20"
            package-manager: npm
            has-typecheck: false
          - name: document-service
            path: ./api/services/document-service
            node-version: "20"
            package-manager: pnpm
            has-typecheck: true
          - name: notification-service
            path: ./api/services/notification-service
            node-version: "20"
            package-manager: npm
            has-typecheck: false
          - name: organization-service
            path: ./api/services/organization-service
            node-version: "20"
            package-manager: npm
            has-typecheck: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.service.node-version }}

      - name: Setup pnpm
        if: matrix.service.package-manager == 'pnpm'
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: |
          if [ "${{ matrix.service.package-manager }}" = "pnpm" ]; then
            pnpm install --no-frozen-lockfile
          else
            npm install
          fi

      - name: Run linting
        working-directory: ${{ matrix.service.path }}
        run: |
          if [ "${{ matrix.service.package-manager }}" = "pnpm" ]; then
            pnpm run lint
          else
            npm run lint
          fi

      - name: Run type check
        if: matrix.service.has-typecheck
        working-directory: ${{ matrix.service.path }}
        run: |
          if [ "${{ matrix.service.package-manager }}" = "pnpm" ]; then
            pnpm run build
          else
            npm run build
          fi

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install -g semantic-release@24 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            @semantic-release/github@11 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: api-gateway
            context: ./api/services/api-gateway
            dockerfile: ./api/services/api-gateway/Dockerfile
            image: api-gateway
          - name: auth-service
            context: ./api/services/authentication-service
            dockerfile: ./api/services/authentication-service/Dockerfile
            image: auth-service
          - name: document-service
            context: ./api/services/document-service
            dockerfile: ./api/services/document-service/Dockerfile
            image: document-service
          - name: notification-service
            context: ./api/services/notification-service
            dockerfile: ./api/services/notification-service/Dockerfile
            image: notification-service
          - name: organization-service
            context: ./api/services/organization-service
            dockerfile: ./api/services/organization-service/Dockerfile
            image: organization-service

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build-and-push.result == 'success'
    permissions:
      contents: read

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Save DigitalOcean kubeconfig
        if: success()
        run: doctl kubernetes cluster kubeconfig save scriptumai-cluster
        continue-on-error: true

      - name: Install metrics-server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl rollout status deployment/metrics-server -n kube-system --timeout=2m || true

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f api/k8s/namespace.yaml
          kubectl apply -f api/k8s/prometheus.yaml
          kubectl apply -f api/k8s/kube-state-metrics.yaml
          kubectl apply -f api/k8s/grafana.yaml
          kubectl apply -f api/k8s/rabbitmq.yaml
          kubectl apply -f api/k8s/auth-service.yaml
          kubectl apply -f api/k8s/organization-service.yaml
          kubectl apply -f api/k8s/document-service.yaml
          kubectl apply -f api/k8s/notification-service.yaml
          kubectl apply -f api/k8s/api-gateway.yaml
          kubectl apply -f api/k8s/hpa.yaml

      - name: Force delete old replica sets (cleanup)
        run: |
          kubectl delete replicaset -n scriptumai -l app=auth-service --field-selector=status.replicas=0 || true
          kubectl delete replicaset -n scriptumai -l app=organization-service --field-selector=status.replicas=0 || true
          kubectl delete replicaset -n scriptumai -l app=document-service --field-selector=status.replicas=0 || true
          kubectl delete replicaset -n scriptumai -l app=notification-service --field-selector=status.replicas=0 || true
          kubectl delete replicaset -n scriptumai -l app=api-gateway --field-selector=status.replicas=0 || true

      - name: Restart deployments
        run: |
          kubectl patch deployment auth-service -n scriptumai --type=json -p='[{"op":"remove","path":"/spec/strategy/rollingUpdate"},{"op":"replace","path":"/spec/strategy/type","value":"Recreate"}]'
          kubectl patch deployment organization-service -n scriptumai --type=json -p='[{"op":"remove","path":"/spec/strategy/rollingUpdate"},{"op":"replace","path":"/spec/strategy/type","value":"Recreate"}]'
          kubectl patch deployment document-service -n scriptumai --type=json -p='[{"op":"remove","path":"/spec/strategy/rollingUpdate"},{"op":"replace","path":"/spec/strategy/type","value":"Recreate"}]'
          kubectl patch deployment notification-service -n scriptumai --type=json -p='[{"op":"remove","path":"/spec/strategy/rollingUpdate"},{"op":"replace","path":"/spec/strategy/type","value":"Recreate"}]'
          kubectl patch deployment api-gateway -n scriptumai --type=json -p='[{"op":"remove","path":"/spec/strategy/rollingUpdate"},{"op":"replace","path":"/spec/strategy/type","value":"Recreate"}]'
          kubectl rollout restart deployment/auth-service -n scriptumai
          kubectl rollout restart deployment/organization-service -n scriptumai
          kubectl rollout restart deployment/document-service -n scriptumai
          kubectl rollout restart deployment/notification-service -n scriptumai
          kubectl rollout restart deployment/api-gateway -n scriptumai

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/auth-service -n scriptumai --timeout=2m || echo "⚠️  auth-service timeout"
          kubectl rollout status deployment/organization-service -n scriptumai --timeout=2m || echo "⚠️  organization-service timeout"
          kubectl rollout status deployment/document-service -n scriptumai --timeout=2m || echo "⚠️  document-service timeout"
          kubectl rollout status deployment/notification-service -n scriptumai --timeout=2m || echo "⚠️  notification-service timeout"
          kubectl rollout status deployment/api-gateway -n scriptumai --timeout=2m || echo "⚠️  api-gateway timeout"

      - name: Restore RollingUpdate strategy
        if: always()
        run: |
          kubectl patch deployment auth-service -n scriptumai -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":1,"maxUnavailable":0}}}}'
          kubectl patch deployment organization-service -n scriptumai -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":1,"maxUnavailable":0}}}}'
          kubectl patch deployment document-service -n scriptumai -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":1,"maxUnavailable":0}}}}'
          kubectl patch deployment notification-service -n scriptumai -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":1,"maxUnavailable":0}}}}'
          kubectl patch deployment api-gateway -n scriptumai -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":1,"maxUnavailable":0}}}}'

      - name: Verify deployment
        if: always()
        run: |
          kubectl get deployments -n scriptumai -o wide
          kubectl get pods -n scriptumai -o wide
          kubectl get events -n scriptumai --sort-by='.lastTimestamp' | tail -30
