apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwa-service
  namespace: scriptumai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pwa-service
  template:
    metadata:
      labels:
        app: pwa-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: pwa-service
          image: ghcr.io/scriptumai-mei/pwa-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: API_GATEWAY_URL
              value: "http://api-gateway"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pwa-service
  namespace: scriptumai
spec:
  selector:
    app: pwa-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
