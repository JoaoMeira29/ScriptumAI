name: Load Testing with k6

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Type of test to run"
        required: true
        default: "load"
        type: choice
        options:
          - load
          - stress
          - spike
      target_url:
        description: "Target URL (leave empty for production)"
        required: false
        type: string

jobs:
  k6-test:
    name: Run k6 Load Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Get target URL
        id: get-url
        run: |
          if [ -z "${{ github.event.inputs.target_url }}" ]; then
            echo "TARGET_URL=${{ secrets.API_GATEWAY_URL }}" >> $GITHUB_OUTPUT
          else
            echo "TARGET_URL=${{ github.event.inputs.target_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Load Test
        if: github.event.inputs.test_type == 'load'
        run: |
          k6 run \
            --out json=results.json \
            --summary-export=summary.json \
            -e BASE_URL=${{ steps.get-url.outputs.TARGET_URL }} \
            api/k6/load-test.js

      - name: Run Stress Test
        if: github.event.inputs.test_type == 'stress'
        run: |
          k6 run \
            --out json=results.json \
            --summary-export=summary.json \
            -e BASE_URL=${{ steps.get-url.outputs.TARGET_URL }} \
            api/k6/stress-test.js

      - name: Run Spike Test
        if: github.event.inputs.test_type == 'spike'
        run: |
          k6 run \
            --out json=results.json \
            --summary-export=summary.json \
            -e BASE_URL=${{ steps.get-url.outputs.TARGET_URL }} \
            api/k6/spike-test.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: |
            results.json
            summary.json

      - name: Display summary
        if: always()
        run: |
          echo "## k6 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Type: ${{ github.event.inputs.test_type }}" >> $GITHUB_STEP_SUMMARY
          echo "### Target URL: ${{ steps.get-url.outputs.TARGET_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat summary.json >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
